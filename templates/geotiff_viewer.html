<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mt. Rainier — Yearly Satellite 3D Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        #viewer { width: 100vw; height: 100vh; display: block; }
        #ui {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); color: #fff; padding: 12px 24px;
            border-radius: 10px; display: flex; align-items: center; gap: 16px;
            backdrop-filter: blur(8px); z-index: 10;
        }
        #ui label { font-size: 14px; display: flex; align-items: center; gap: 8px; }
        #ui input[type=range] { width: 200px; accent-color: #4fc3f7; }
        #ui span#yearLabel { font-weight: 700; font-size: 16px; min-width: 40px; }
        #ui button {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
            color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer;
            font-size: 13px; transition: background 0.2s;
        }
        #ui button:hover { background: rgba(255,255,255,0.3); }
        #status {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 14px; background: rgba(0,0,0,0.6);
            padding: 6px 16px; border-radius: 20px; z-index: 10;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <canvas id="viewer"></canvas>
    <div id="status">Loading...</div>
    <div id="ui">
        <button id="btnPrev">◀</button>
        <label>Year <span id="yearLabel">2024</span></label>
        <input type="range" id="yearSlider" min="0" max="0" value="0" step="1">
        <button id="btnNext">▶</button>
        <button id="btnPlay">▶ Play</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const canvas = document.getElementById('viewer');
        const statusEl = document.getElementById('status');
        const yearLabel = document.getElementById('yearLabel');
        const yearSlider = document.getElementById('yearSlider');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const btnPlay = document.getElementById('btnPlay');

        // --- Three.js scene setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        // Camera above the terrain, looking down at ~35° from horizontal
        camera.position.set(0, 3.0, 2.0);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;

        // ── Earth-map-style rotation lock ──
        controls.enableRotate = true;
        controls.rotateSpeed = 0.6;
        // Polar angle measured from +Y (up). 0 = top-down.
        controls.minPolarAngle = 0;                      // allow top-down
        controls.maxPolarAngle = Math.PI / 2.8;          // ~64° — prevents going under the map
        controls.maxAzimuthAngle = Infinity;
        controls.minAzimuthAngle = -Infinity;
        controls.enablePan = true;
        controls.panSpeed = 0.8;
        controls.update();

        // Lighting — simulate sun from above
        scene.add(new THREE.AmbientLight(0xcccccc, 1.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(1, 3, 1);
        scene.add(dirLight);

        // --- Loading texture ---
        const textureLoader = new THREE.TextureLoader();

        // Terrain mesh — will be replaced when data loads
        let terrainMesh = null;

        async function loadYear(year) {
            statusEl.textContent = `Loading ${year}...`;
            yearLabel.textContent = year;
            try {
                let res;
                if (currentGlacier) {
                    res = await fetch('/api/glacier-image/tile/' + encodeURIComponent(currentGlacier) + '/' + year);
                } else {
                    res = await fetch('/api/geotiff/' + year);
                }
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                // Load both texture and elevation heightmap
                const texture = textureLoader.load(data.image);
                const elevTexture = textureLoader.load(data.elevation);

                Promise.all([
                    new Promise(r => textureLoader.load(data.image, r)),
                    new Promise(r => textureLoader.load(data.elevation, r)),
                ]).then(() => {
                    const width = data.width;
                    const height = data.height;
                    const aspect = width / height;

                    // Remove old mesh
                    if (terrainMesh) {
                        terrainMesh.geometry.dispose();
                        terrainMesh.material.dispose();
                        scene.remove(terrainMesh);
                    }

                    // Create a subdivided plane for displacement
                    const segW = Math.min(width - 1, 200);
                    const segH = Math.min(height - 1, 200);
                    const geometry = new THREE.PlaneGeometry(2 * aspect, 2, segW, segH);

                    // Displace vertices using elevation data
                    // We need to read pixels from the elevation texture — use a canvas
                    const elevCanvas = document.createElement('canvas');
                    elevCanvas.width = width;
                    elevCanvas.height = height;
                    const ctx = elevCanvas.getContext('2d');
                    const elevImg = new Image();
                    elevImg.onload = () => {
                        ctx.drawImage(elevImg, 0, 0);
                        const imageData = ctx.getImageData(0, 0, width, height);
                        const pixels = imageData.data; // RGBA, we use R channel

                        const positions = geometry.attributes.position;
                        const colCount = segW + 1;
                        const rowCount = segH + 1;
                        const zScale = 0.6; // how tall the mountains appear

                        for (let row = 0; row < rowCount; row++) {
                            for (let col = 0; col < colCount; col++) {
                                const px = Math.floor(col / segW * (width - 1));
                                const py = Math.floor((1 - row / segH) * (height - 1));
                                const idx = (py * width + px) * 4;
                                const elev = pixels[idx] / 255; // 0–1
                                const i = row * colCount + col;
                                positions.setZ(i, positions.getZ(i) + elev * zScale);
                            }
                        }
                        geometry.computeVertexNormals();
                        geometry.attributes.position.needsUpdate = true;

                        const material = new THREE.MeshStandardMaterial({
                            map: texture,
                            side: THREE.DoubleSide,
                            roughness: 0.4,
                            metalness: 0.05,
                        });

                        terrainMesh = new THREE.Mesh(geometry, material);
                        // Rotate plane from vertical (XY) to horizontal (XZ) — like a map on a table
                        terrainMesh.rotation.x = -Math.PI / 2;
                        scene.add(terrainMesh);

                        statusEl.textContent = (currentGlacier || 'Mt. Rainier') + ` — ${year}  ⛰ ${data.elevMin?.toFixed(0) ?? '?'}–${data.elevMax?.toFixed(0) ?? '?'}m`;
                        statusEl.style.opacity = 1;
                        setTimeout(() => { statusEl.style.opacity = 0; }, 2500);
                    };
                    elevImg.src = data.elevation;
                });
            } catch (e) {
                statusEl.textContent = `Error: ${e.message}`;
                console.error(e);
            }
        }

        // --- Initialize ---
        let years = [];
        let currentIndex = 0;
        let playInterval = null;
        let currentGlacier = null;

        // Read ?glacier= from URL
        const urlParams = new URLSearchParams(window.location.search);
        currentGlacier = urlParams.get('glacier') || null;

        // Update title
        if (currentGlacier) {
            document.title = currentGlacier + ' — 3D Satellite View';
        }

        async function init() {
            try {
                let res;
                if (currentGlacier) {
                    res = await fetch('/api/glacier-image/years/' + encodeURIComponent(currentGlacier));
                } else {
                    res = await fetch('/api/geotiff/years');
                }
                const data = await res.json();
                years = data.years || data;
                if (!years.length) {
                    statusEl.textContent = 'No GeoTIFF images found.';
                    return;
                }
                yearSlider.max = years.length - 1;
                // Default to the latest year
                currentIndex = years.length - 1;
                yearSlider.value = currentIndex;
                loadYear(years[currentIndex]);
            } catch (e) {
                statusEl.textContent = `Failed to load year list: ${e.message}`;
            }
        }

        yearSlider.addEventListener('input', () => {
            currentIndex = parseInt(yearSlider.value);
            loadYear(years[currentIndex]);
        });

        btnPrev.addEventListener('click', () => {
            currentIndex = Math.max(0, currentIndex - 1);
            yearSlider.value = currentIndex;
            loadYear(years[currentIndex]);
        });

        btnNext.addEventListener('click', () => {
            currentIndex = Math.min(years.length - 1, currentIndex + 1);
            yearSlider.value = currentIndex;
            loadYear(years[currentIndex]);
        });

        btnPlay.addEventListener('click', () => {
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
                btnPlay.textContent = '▶ Play';
                return;
            }
            btnPlay.textContent = '⏸ Pause';
            playInterval = setInterval(() => {
                currentIndex = (currentIndex + 1) % years.length;
                yearSlider.value = currentIndex;
                loadYear(years[currentIndex]);
            }, 1200);
        });

        // Keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') btnPrev.click();
            if (e.key === 'ArrowRight') btnNext.click();
            if (e.key === ' ') { e.preventDefault(); btnPlay.click(); }
        });

        // Render loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
