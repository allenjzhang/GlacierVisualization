<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glacier Map Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ice:     #d6eef8;
      --deep:    #0a2a3a;
      --glacier: #2e8cb5;
      --melt:    #e06c4a;
      --frost:   #a8d8ea;
      --text:    #cde8f5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--deep);
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(46,140,181,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(10,42,58,0.9) 0%, transparent 60%);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeDown 0.8s ease both;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--glacier);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 700;
      color: var(--ice);
      line-height: 1.1;
      margin-bottom: 12px;
    }

    h1 span { color: var(--glacier); }

    .subtitle {
      font-size: 0.78rem;
      color: #7aafc5;
      letter-spacing: 0.05em;
    }

    .chart-card {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .chart-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--ice);
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    #map {
      width: 90vw;
      min-height: 75vh;
      border-radius: 16px;
      border: 1px solid rgba(168,216,234,0.16);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .glacier-list {
      width: 100%;
      max-width: 960px;
      display: grid;
      gap: 18px;
      margin-top: 24px;
      animation: fadeUp 0.8s 0.6s ease both;
    }

    .glacier-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(168,216,234,0.12);
      border-radius: 16px;
      padding: 22px 26px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr auto;
      align-items: center;
    }

    .glacier-card h3 {
      margin-bottom: 6px;
      font-size: 1rem;
      color: var(--ice);
    }

    .glacier-card p {
      color: #bfdcea;
      line-height: 1.6;
      font-size: 0.92rem;
    }

    .glacier-card a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      background: rgba(46,140,181,0.12);
      border: 1px solid rgba(46,140,181,0.22);
      border-radius: 999px;
      color: #d6eef8;
      text-decoration: none;
      font-size: 0.85rem;
      transition: background 0.2s ease;
    }

    .glacier-card a:hover {
      background: rgba(46,140,181,0.2);
    }

    .leaflet-popup-content-wrapper {
      background: rgba(10,42,58,0.95);
      color: #d6eef8;
      border-radius: 14px;
      border: 1px solid rgba(46,140,181,0.2);
    }

    .leaflet-popup-content a {
      color: #a8d8ea;
      text-decoration: underline;
    }

    .leaflet-control-attribution {
      color: rgba(255,255,255,0.7) !important;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Modal overlay styles ── */
    #modalOverlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(5, 15, 25, 0.92); backdrop-filter: blur(6px);
      justify-content: center; align-items: center;
    }
    #modalOverlay.active { display: flex; }
    #modalOverlay .modal-panel {
      background: var(--deep); border: 1px solid rgba(168,216,234,0.2);
      border-radius: 20px; width: 95vw; max-width: 960px; height: 85vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: 0 0 60px rgba(46,140,181,0.15);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px; border-bottom: 1px solid rgba(168,216,234,0.12);
    }
    .modal-header h2 {
      font-family: 'Playfair Display', serif; color: var(--ice); font-size: 1.2rem;
    }
    .modal-close {
      background: none; border: 1px solid rgba(255,255,255,0.2); color: var(--text);
      font-size: 1.4rem; width: 36px; height: 36px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: rgba(255,255,255,0.1); }
    .modal-body { flex: 1; position: relative; background: #0a1a28; }
    .modal-controls {
      display: flex; align-items: center; gap: 12px; padding: 12px 24px;
      border-top: 1px solid rgba(168,216,234,0.12); flex-wrap: wrap;
    }
    .modal-controls label { font-size: 0.78rem; color: #7aafc5; display: flex; align-items: center; gap: 6px; }
    .modal-controls input[type=range] { width: 160px; accent-color: #4fc3f7; }
    .modal-controls button {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      color: #d6eef8; padding: 6px 12px; border-radius: 6px;
      cursor: pointer; font-size: 0.78rem; transition: background 0.2s;
    }
    .modal-controls button:hover { background: rgba(255,255,255,0.18); }
    .modal-spinner {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; z-index: 20;
      background: rgba(10,26,40,0.85);
    }
    .modal-spinner .spinner-ring {
      width: 48px; height: 48px; border: 4px solid rgba(168,216,234,0.15);
      border-top-color: #4fc3f7; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .modal-spinner .spinner-text { color: #a8d8ea; font-size: 0.85rem; }
    .modal-spinner .spinner-sub { color: #5a8ca0; font-size: 0.7rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .glacier-card .btn-3d {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 18px; background: rgba(46,140,181,0.12);
      border: 1px solid rgba(46,140,181,0.22); border-radius: 999px;
      color: #d6eef8; text-decoration: none; font-size: 0.85rem;
      cursor: pointer; transition: background 0.2s ease;
    }
    .glacier-card .btn-3d:hover { background: rgba(46,140,181,0.22); }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Climate Data Visualization</p>
  <h1>Glacier <span>World Map</span> Interactive Explorer</h1>
</header>

<div class="chart-card">
  <!-- <div class="chart-header">
    <span class="chart-title">Glacier map with clickable mountain markers</span>
    <div class="legend" id="legend"></div>
  </div> -->
  <div id="map"></div>
</div>

<div class="glacier-list" id="glacierList"></div>

<!-- ── 3D Viewer Modal ── -->
<div id="modalOverlay">
  <div class="modal-panel">
    <div class="modal-header">
      <h2 id="modalTitle">3D Satellite View</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="modal-spinner" id="modalSpinner">
        <div class="spinner-ring"></div>
        <div class="spinner-text">Downloading satellite imagery…</div>
        <div class="spinner-sub" id="spinnerSub"></div>
      </div>
      <iframe id="modalIframe" src="" style="width:100%;height:100%;border:none;display:none" allow="fullscreen"></iframe>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// ── 3D Modal (opens the geotiff_viewer in an iframe) ──
async function open3DModal(glacierName) {
  const overlay = document.getElementById('modalOverlay');
  const spinner = document.getElementById('modalSpinner');
  const sub = document.getElementById('spinnerSub');
  const iframe = document.getElementById('modalIframe');
  const title = document.getElementById('modalTitle');

  title.textContent = glacierName + ' — 3D Satellite View';
  overlay.classList.add('active');
  spinner.style.display = 'flex';
  iframe.style.display = 'none';
  sub.textContent = '';

  // Trigger download if needed, then load iframe
  try {
    let res = await fetch('/api/glacier-image/years/' + encodeURIComponent(glacierName));
    let info = await res.json();
    if (!info.complete) {
      sub.textContent = 'Fetching from satellite (this may take a minute)…';
      await fetch('/api/glacier-image/download/' + encodeURIComponent(glacierName), { method: 'POST' });
      for (let i = 0; i < 120; i++) {
        await new Promise(r => setTimeout(r, 2000));
        let sr = await fetch('/api/glacier-image/status/' + encodeURIComponent(glacierName));
        let st = await sr.json();
        sub.textContent = (st.years_ready || []).length + ' years downloaded…';
        if (st.complete) break;
      }
    }
  } catch (e) {
    console.error(e);
  }

  // Hide spinner, show iframe with the working geotiff_viewer page
  spinner.style.display = 'none';
  iframe.src = '/geotiff-viewer?glacier=' + encodeURIComponent(glacierName);
  iframe.style.display = 'block';
}

function close3DModal() {
  const overlay = document.getElementById('modalOverlay');
  const iframe = document.getElementById('modalIframe');
  overlay.classList.remove('active');
  iframe.src = '';
  iframe.style.display = 'none';
}

document.getElementById('modalClose').addEventListener('click', close3DModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) close3DModal();
});
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') close3DModal(); });

// ── Glacier marker data ──
const glacierMarkers = {{ glacier_markers | tojson }};

  function createMap() {
    const map = L.map('map', { preferCanvas: true, zoomControl: true }).setView([15, 0], 3);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: '&copy; Esri, Maxar, Earthstar Geographics, and the GIS User Community',
      maxZoom: 18,
      noWrap: true,
    }).addTo(map);

    // Overlay glacier polygons from GeoJSON
    fetch('/static/named.geojson')
      .then(res => res.json())
      .then(geojson => {
        L.geoJSON(geojson, {
          smoothFactor: 10,
          style: function(feature) {
            if (feature.properties && feature.properties.glac_name !== "None") {
              return {
                color: '#FF6900', // dark blue
                weight: 1.5,
                fillOpacity: 0.35
              };
            } else {
              return {
                color: '#FF6900', // original blue
                weight: 1,
                fillOpacity: 0.22
              };
            }
          },
          onEachFeature: function (feature, layer) {
            let popupContent = '';
            const name = feature.properties?.name || '';
            if (feature.properties) {
              if (name) {
                popupContent = '<strong>Glacier: ' + name + '</strong>';
              } else {
                popupContent = '<strong>Glacier polygon</strong>';
              }
              popupContent += '<ul style="margin:8px 0 0 0;padding-left:18px;font-size:0.95em">';
              for (const [key, value] of Object.entries(feature.properties)) {
                popupContent += `<li><b>${key}:</b> ${value}</li>`;
              }
              popupContent += '</ul>';
            } else {
              popupContent = 'Glacier polygon';
            }
            // Add 3D View button if name matches a known glacier
            if (name && glacierMarkers[name]) {
              popupContent += `<br><a href="#" onclick="open3DModal('${name.replace(/'/g, "\\'")}');return false" style="color:#4fc3f7;font-weight:bold;text-decoration:underline;">🏔 Open 3D View</a>`;
            }
            layer.bindPopup(popupContent);
          }
        }).addTo(map);
      });

    Object.entries(glacierMarkers).forEach(([name, glacier]) => {
      const marker = L.marker([glacier.latitude, glacier.longitude]).addTo(map);
      marker.bindPopup(`
        <strong>${name}</strong><br>
        ${glacier.country}<br>
        <a href="/glacier/${encodeURIComponent(name)}">View details</a><br>
        <a href="#" onclick="open3DModal('${name.replace(/'/g, "\\'")}');return false" style="color:#4fc3f7;">🏔 Open 3D View</a>
      `);
      marker.on('click', () => marker.openPopup());
    });
  }

  async function loadData() {
    const res = await fetch('/api/glaciers');
    const data = await res.json();

    const grouped = {};
    data.forEach(row => {
      if (!grouped[row.glacier_name]) grouped[row.glacier_name] = [];
      grouped[row.glacier_name].push(row);
    });

    const listEl = document.getElementById('glacierList');
    Object.entries(glacierMarkers).forEach(([name, glacier]) => {
      const latest = grouped[name]?.slice().sort((a, b) => b.year - a.year)[0];
      const latestThickness = latest ? `${latest.thickness_meters} m` : 'N/A';
      listEl.innerHTML += `
        <div class="glacier-card">
          <div>
            <h3>${name} — ${glacier.country}</h3>
            <p>${glacier.description}</p>
            <p><strong>Latest thickness:</strong> ${latestThickness}</p>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <a href="/glacier/${encodeURIComponent(name)}">See details</a>
            <span class="btn-3d" onclick="open3DModal('${name.replace(/'/g, "\\'")}')">🏔 3D View</span>
          </div>
        </div>`;
    });
  }

  createMap();
  loadData();
</script>
</body>
</html>
