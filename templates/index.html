<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glacier Thickness Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ice:     #d6eef8;
      --deep:    #0a2a3a;
      --glacier: #2e8cb5;
      --melt:    #e06c4a;
      --frost:   #a8d8ea;
      --text:    #cde8f5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--deep);
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(46,140,181,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(10,42,58,0.9) 0%, transparent 60%);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown 0.8s ease both;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--glacier);
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.6rem);
      font-weight: 700;
      color: var(--ice);
      line-height: 1.1;
      margin-bottom: 12px;
    }

    h1 span { color: var(--glacier); }

    .subtitle {
      font-size: 0.78rem;
      color: #7aafc5;
      letter-spacing: 0.05em;
    }

    /* Stat cards */
    .stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(168,216,234,0.15);
      border-radius: 12px;
      padding: 18px 28px;
      text-align: center;
      backdrop-filter: blur(6px);
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--ice);
    }

    .stat-value.danger { color: var(--melt); }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7aafc5;
      margin-top: 4px;
    }

    /* Chart card */
    .chart-card {
      width: 100%;
      max-width: 860px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(168,216,234,0.12);
      border-radius: 20px;
      padding: 32px;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .chart-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--ice);
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    canvas { width: 100% !important; }

    /* Data table */
    .table-card {
      width: 100%;
      max-width: 860px;
      margin-top: 32px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(168,216,234,0.12);
      border-radius: 20px;
      padding: 28px 32px;
      animation: fadeUp 0.8s 0.6s ease both;
    }

    .table-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--ice);
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(168,216,234,0.2);
      color: var(--glacier);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-size: 0.65rem;
    }

    td {
      padding: 9px 12px;
      border-bottom: 1px solid rgba(168,216,234,0.06);
      color: var(--text);
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: rgba(255,255,255,0.03); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.65rem;
    }

    .badge-blue  { background: rgba(46,140,181,0.2); color: #7dd3f0; }
    .badge-teal  { background: rgba(56,178,172,0.2); color: #81e6d9; }
    .badge-green { background: rgba(72,187,120,0.2); color: #9ae6b4; }

    footer {
      margin-top: 48px;
      font-size: 0.65rem;
      color: #3d6a80;
      letter-spacing: 0.1em;
      text-align: center;
      animation: fadeUp 0.8s 0.8s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">Climate Data Visualization</p>
  <h1>Glacier <span>Thickness</span><br>Over Time</h1>
  <p class="subtitle">Data sourced from SQLite database &bull; Rendered with Chart.js</p>
</header>

<div class="stats" id="stats">
  <!-- Filled by JS -->
</div>

<div class="chart-card">
  <div class="chart-header">
    <span class="chart-title">Thickness in Meters (1950 – 2023)</span>
    <div class="legend" id="legend"></div>
  </div>
  <canvas id="glacierChart"></canvas>
</div>

<div class="table-card">
  <h2>Raw Database Records</h2>
  <table>
    <thead>
      <tr>
        <th>Year</th>
        <th>Glacier</th>
        <th>Thickness (m)</th>
        <th>Change</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<footer>
  <p>Flask + SQLite + Chart.js &nbsp;&bull;&nbsp; Glacier Tracker v1.0</p>
</footer>

<script>
  const COLORS = {
    "Athabasca":    { line: "#4fb3d9", fill: "rgba(79,179,217,0.12)" },
    "Rhône":        { line: "#f4a261", fill: "rgba(244,162,97,0.12)"  },
    "Perito Moreno":{ line: "#57cc99", fill: "rgba(87,204,153,0.12)"  },
  };

  const BADGE_CLASS = {
    "Athabasca":    "badge-blue",
    "Rhône":        "badge-teal",
    "Perito Moreno":"badge-green",
  };

  async function loadData() {
    const res = await fetch("/api/glaciers");
    const data = await res.json();

    // Group by glacier name
    const grouped = {};
    data.forEach(row => {
      if (!grouped[row.glacier_name]) grouped[row.glacier_name] = [];
      grouped[row.glacier_name].push(row);
    });

    // Build chart datasets
    const allYears = [...new Set(data.map(r => r.year))].sort();
    const datasets = Object.entries(grouped).map(([name, rows]) => {
      const yearMap = Object.fromEntries(rows.map(r => [r.year, r.thickness_meters]));
      return {
        label: name,
        data: allYears.map(y => yearMap[y] ?? null),
        borderColor: COLORS[name]?.line ?? "#ccc",
        backgroundColor: COLORS[name]?.fill ?? "transparent",
        fill: true,
        tension: 0.4,
        pointRadius: 5,
        pointHoverRadius: 8,
        borderWidth: 2.5,
      };
    });

    // Render chart
    const ctx = document.getElementById("glacierChart").getContext("2d");
    new Chart(ctx, {
      type: "line",
      data: { labels: allYears, datasets },
      options: {
        responsive: true,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "rgba(10,42,58,0.95)",
            borderColor: "rgba(168,216,234,0.2)",
            borderWidth: 1,
            titleColor: "#d6eef8",
            bodyColor: "#a8d8ea",
            padding: 14,
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} m`
            }
          }
        },
        scales: {
          x: {
            ticks: { color: "#7aafc5", font: { family: "DM Mono", size: 11 } },
            grid:  { color: "rgba(168,216,234,0.06)" }
          },
          y: {
            ticks: {
              color: "#7aafc5",
              font: { family: "DM Mono", size: 11 },
              callback: v => v + " m"
            },
            grid: { color: "rgba(168,216,234,0.06)" }
          }
        }
      }
    });

    // Legend
    const legendEl = document.getElementById("legend");
    Object.entries(COLORS).forEach(([name, c]) => {
      legendEl.innerHTML += `
        <span class="legend-item">
          <span class="legend-dot" style="background:${c.line}"></span>${name}
        </span>`;
    });

    // Stat cards
    const statsEl = document.getElementById("stats");
    Object.entries(grouped).forEach(([name, rows]) => {
      const sorted = rows.sort((a,b) => a.year - b.year);
      const first = sorted[0].thickness_meters;
      const last  = sorted[sorted.length - 1].thickness_meters;
      const loss  = ((first - last) / first * 100).toFixed(1);
      statsEl.innerHTML += `
        <div class="stat-card">
          <div class="stat-value danger">-${loss}%</div>
          <div class="stat-label">${name}<br>thickness lost</div>
        </div>`;
    });

    // Table
    const tbody = document.getElementById("tableBody");
    data.forEach((row, i) => {
      const prev = data.slice(0, i).reverse().find(r => r.glacier_name === row.glacier_name);
      const diff = prev ? (row.thickness_meters - prev.thickness_meters).toFixed(1) : "—";
      const diffStr = diff === "—" ? "—" : (diff > 0 ? `+${diff} m` : `${diff} m`);
      const diffColor = diff < 0 ? "color:#e06c4a" : diff === "—" ? "" : "color:#57cc99";
      tbody.innerHTML += `
        <tr>
          <td>${row.year}</td>
          <td><span class="badge ${BADGE_CLASS[row.glacier_name] ?? ''}">${row.glacier_name}</span></td>
          <td>${row.thickness_meters} m</td>
          <td style="${diffColor}">${diffStr}</td>
        </tr>`;
    });
  }

  loadData();
</script>
</body>
</html>
